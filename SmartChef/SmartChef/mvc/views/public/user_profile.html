<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>User Profile</h1>
</header>

<div class="profile-container">
    <div class="user-block register-form">
        <h2>Account information</h2>
        <p><strong>Username:</strong> <span id="username">loading ...</span></p>
        <p><strong>Email:</strong> <span id="email">loading ...</span></p>
    </div>

    <div class="body-info-block register-form">
        <h2>Body parameters</h2>
            <div class="form-row">
                <label for="height">Height (cm):</label>
                <input type="number" id="height" name="height" placeholder="Enter your height" />
            </div>

            <div class="form-row">
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" name="weight" placeholder="Enter your weight" />
            </div>

            <div class="form-row">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" placeholder="Enter your age" />
            </div>

            <div class="form-row">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender">
                    <option value="">— Select —</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-row">
                <label for="activityLevel">Activity Level:</label>
                <select id="activityLevel" name="activityLevel">
                    <option value="">— Select —</option>
                    <option value="Sedentary">Sedentary (little or no exercise)</option>
                    <option value="Light">Light activity (1–3 days/week)</option>
                    <option value="Moderate">Moderate activity (3–5 days/week)</option>
                    <option value="High">High activity (6–7 days/week)</option>
                    <option value="Extreme">Extreme (very hard exercise, physical job)</option>
                </select>
            </div>

            <div class="form-row">
                <label for="goal">Goal:</label>
                <select id="goal" name="goal">
                    <option value="">— Select —</option>
                    <option value="WeightLoss">Lose weight</option>
                    <option value="Maintenance">Maintain weight</option>
                    <option value="WeightGain">Gain muscle</option>
                    <option value="Recomposition">Recomposition</option>
                </select>
            </div>

            <button type="submit">Save сhanges</button>
            <p id="message" class="register-message" style="display: none"></p>
            
    </div>
    <button onclick="window.location.href='/meal_plan'">Go to meal plan</button>
</div>

<!-- Quit Button -->
<button id="logoutBtn" class="logout-btn">Quit</button>
<script src="user_profile.js"></script>
</body>
</html>
